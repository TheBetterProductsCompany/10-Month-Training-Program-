<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE RELENTLESS 42 AUDIT</title>
<style>
@import url('https://fonts.cdnfonts.com/css/lemon-milk');
@import url('https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap');

:root {
  --bg: #000000;
  --surface: #1C1C1E;
  --surface-raised: #2C2C2E;
  --surface-glass: rgba(255,255,255,.05);
  --glass-border: rgba(255,255,255,.08);
  --glass-border-strong: rgba(255,255,255,.12);
  --glass-hover: rgba(255,255,255,.08);
  --white: #F5F5F7;
  --text: #F5F5F7;
  --text-secondary: #A1A1A6;
  --text-tertiary: #6E6E73;
  --border: rgba(255,255,255,.06);
  --border-light: rgba(255,255,255,.04);
  --green: #30D158;
  --green-soft: rgba(48,209,88,.12);
  --red: #FF453A;
  --red-soft: rgba(255,69,58,.1);
  --orange: #FF9F0A;
  --accent: #F5F5F7;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.4);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 18px;
  --radius-xl: 22px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  font-family:'Satoshi',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100%; -webkit-font-smoothing:antialiased;
  overflow-x:hidden; font-weight:400;
}

/* ════════════ LOGIN ════════════ */
#login {
  position:fixed; inset:0; z-index:9999;
  background:#000; display:flex; align-items:center;
  justify-content:center; flex-direction:column;
  transition:opacity .6s,transform .6s;
}
#login.out { opacity:0; pointer-events:none; transform:scale(1.02); }
.l-pre {
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:10px;
  color:rgba(255,255,255,.12); margin-bottom:52px; text-transform:uppercase;
}
.l-title {
  font-family:'LEMON MILK',sans-serif; font-size:clamp(28px,8vw,48px);
  letter-spacing:6px; color:#fff; margin-bottom:10px; text-transform:uppercase;
}
.l-sub {
  font-size:11px; letter-spacing:7px; color:rgba(255,255,255,.12);
  margin-bottom:52px; text-transform:uppercase;
}
#login input {
  width:300px; padding:18px 24px;
  background:rgba(255,255,255,.04); backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,.08); border-radius:var(--radius);
  color:#fff; font-family:'Satoshi',sans-serif; font-size:15px;
  letter-spacing:4px; text-align:center; outline:none;
  transition:all .3s;
}
#login input::placeholder { color:rgba(255,255,255,.15); font-size:11px; letter-spacing:5px; }
#login input:focus { border-color:rgba(255,255,255,.2); background:rgba(255,255,255,.07); }
.l-btn {
  margin-top:24px; padding:16px 56px;
  background:#fff; color:#000; border-radius:980px;
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:5px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .3s;
}
.l-btn:hover { opacity:.85; transform:translateY(-1px); }
.l-err {
  margin-top:18px; font-size:11px; letter-spacing:2px; color:var(--red);
  opacity:0; transition:opacity .3s;
}
.l-err.on { opacity:1; }

/* ════════════ APP SHELL ════════════ */
#app { display:none; min-height:100vh; }
#app.on { display:block; }

/* ── TOP STATUS BAR ── */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; border-bottom:1px solid var(--border);
  flex-wrap:wrap; gap:10px;
}
.sb-left { display:flex; align-items:center; gap:16px; }
.live {
  display:flex; align-items:center; gap:8px;
  padding:6px 14px; border-radius:980px;
  background:rgba(48,209,88,.08); border:1px solid rgba(48,209,88,.15);
}
.live-dot {
  width:6px; height:6px; background:var(--green); border-radius:50%;
  box-shadow:0 0 10px rgba(48,209,88,.5);
  animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)} }
.live span {
  font-family:'LEMON MILK',sans-serif; font-size:9px; letter-spacing:3px;
  color:var(--green); text-transform:uppercase;
}
.phase-tag {
  font-size:10px; letter-spacing:2px; color:var(--text-tertiary);
  padding:6px 14px; border-radius:980px;
  border:1px solid var(--border); text-transform:uppercase;
}
.sb-right { display:flex; align-items:center; gap:20px; }
.clock {
  font-family:'LEMON MILK',sans-serif; font-size:clamp(16px,3vw,22px);
  letter-spacing:3px; color:var(--text); font-variant-numeric:tabular-nums;
  opacity:.7;
}
.date-display {
  font-size:10px; letter-spacing:3px; color:var(--text-tertiary); text-transform:uppercase;
}

/* ── TOP NAV TABS ── */
.top-nav {
  display:flex; align-items:center; justify-content:center;
  padding:12px 32px; gap:4px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.5); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:sticky; top:0; z-index:50;
}
.nav-tab {
  padding:10px 24px; font-family:'LEMON MILK',sans-serif; font-size:10px;
  letter-spacing:3px; color:var(--text-tertiary); cursor:pointer;
  border:none; border-radius:980px; background:transparent;
  text-transform:uppercase; transition:all .25s; white-space:nowrap;
}
.nav-tab:hover { color:var(--text-secondary); background:var(--surface-glass); }
.nav-tab.on {
  color:var(--text); background:var(--surface);
}

/* ── WEEK NAV ── */
.weeknav {
  display:flex; align-items:center; justify-content:center;
  gap:16px; padding:16px 32px;
  border-bottom:1px solid var(--border);
}
.wn-btn {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:none; border-radius:50%;
  color:var(--text-secondary); cursor:pointer; font-size:16px;
  transition:all .2s;
}
.wn-btn:hover { background:var(--surface-raised); color:var(--text); }
.wn-label {
  font-family:'LEMON MILK',sans-serif; font-size:12px; letter-spacing:3px;
  color:var(--text); text-transform:uppercase;
}

/* ── DAY TABS ── */
.dtabs {
  display:flex; justify-content:center;
  padding:10px 20px; gap:4px;
  border-bottom:1px solid var(--border);
}
.dtab {
  padding:8px 14px; font-family:'LEMON MILK',sans-serif; font-size:10px;
  letter-spacing:2px; color:var(--text-tertiary); cursor:pointer;
  border:none; border-radius:var(--radius-sm); background:transparent;
  text-transform:uppercase; transition:all .25s; white-space:nowrap;
}
.dtab:hover { color:var(--text-secondary); background:var(--surface-glass); }
.dtab.on { color:var(--text); background:var(--surface); }
.dtab.done::after { content:'✓'; margin-left:5px; font-size:9px; color:var(--green); }

/* ── CONTENT ── */
.panel { display:none; padding:36px 32px; max-width:960px; margin:0 auto; }
.panel.on { display:block; }

/* ── DAY HEADER ── */
.dh-code {
  font-family:'LEMON MILK',sans-serif; font-size:clamp(20px,4vw,28px);
  letter-spacing:5px; color:var(--text); margin-bottom:24px; text-transform:uppercase;
}
.dh-meta { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:40px; }
.dh-m {
  padding:14px 20px; background:var(--surface-glass);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
.dh-m-l {
  font-size:9px; letter-spacing:3px; color:var(--text-tertiary);
  text-transform:uppercase; margin-bottom:4px;
}
.dh-m-v {
  font-family:'LEMON MILK',sans-serif; font-size:12px; letter-spacing:1px; color:var(--text);
}

/* ── SECTIONS ── */
.sec { margin-bottom:32px; }
.sec-h {
  font-family:'LEMON MILK',sans-serif; font-size:11px; letter-spacing:5px;
  color:var(--text-secondary); padding:16px 0 12px;
  margin-bottom:12px; text-transform:uppercase;
}

/* ══════════ GLASS EXERCISE CARDS ══════════ */
.ex {
  display:flex; align-items:flex-start; padding:18px 20px;
  margin-bottom:8px;
  background:var(--surface-glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  cursor:pointer; transition:all .3s ease;
}
.ex:hover {
  border-color:var(--glass-border-strong);
  background:var(--glass-hover);
}
.ex.open {
  border-color:rgba(255,255,255,.15);
  background:rgba(255,255,255,.07);
  cursor:default;
}
.ex-dot {
  width:8px; height:8px; border:1.5px solid var(--text-tertiary);
  border-radius:50%; margin-top:6px; margin-right:16px; flex-shrink:0;
}
.ex.open .ex-dot { background:var(--text); border-color:var(--text); }
.ex-body { flex:1; }
.ex-name { font-size:14px; font-weight:500; color:var(--text); margin-bottom:4px; }
.ex-detail { font-size:13px; color:var(--text-secondary); }
.ex-note { font-size:11px; color:var(--text-tertiary); margin-top:5px; font-style:italic; }
.ex-toggle {
  font-size:9px; letter-spacing:3px; color:var(--text-tertiary); opacity:.4;
  margin-top:8px; text-transform:uppercase; transition:opacity .2s;
}
.ex:hover .ex-toggle { opacity:.7; }
.ex.open .ex-toggle { display:none; }

/* ── SET ROWS ── */
.ex-sets {
  display:none; margin-top:14px; padding-top:12px;
  border-top:1px solid var(--border);
}
.ex.open .ex-sets { display:block; }

.sets-hdr {
  display:grid; grid-template-columns:36px 1fr 1fr 1fr 48px 40px; gap:8px;
  margin-bottom:10px; padding-bottom:8px; align-items:center;
  border-bottom:1px solid var(--border-light);
}
.sets-hdr span {
  font-size:9px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase;
}
.sets-hdr .sh-c { text-align:center; }

.set-row {
  display:grid; grid-template-columns:36px 1fr 1fr 1fr 48px 40px; gap:8px;
  margin-bottom:8px; align-items:center;
}
.set-label {
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:1px;
  color:var(--text-tertiary);
}
.set-target-wt {
  font-family:'LEMON MILK',sans-serif; font-size:12px; letter-spacing:1px;
  color:var(--text); opacity:.3; text-align:center; padding:10px 6px;
  background:var(--surface-glass); border:1px solid var(--border);
  border-radius:var(--radius-sm);
}
.set-input {
  width:100%; padding:11px 10px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-family:'Satoshi',sans-serif; font-size:13px;
  color:var(--text); outline:none; text-align:center; transition:all .2s;
}
.set-input:focus { border-color:rgba(255,255,255,.2); box-shadow:0 0 0 3px rgba(255,255,255,.04); }
.set-input::placeholder { color:var(--text-tertiary); font-size:11px; }

.pct-badge {
  display:flex; align-items:center; justify-content:center;
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:.5px;
  padding:8px 4px; text-align:center; border-radius:var(--radius-sm); transition:all .3s;
}
.pct-badge.hit { background:var(--green-soft); color:var(--green); }
.pct-badge.miss { background:var(--red-soft); color:var(--red); }
.pct-badge.neutral { background:var(--surface-glass); color:var(--text-tertiary); }

.set-confirm {
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:none; border-radius:50%;
  color:var(--text-tertiary); cursor:pointer; transition:all .25s; font-size:14px;
}
.set-confirm:hover { background:var(--surface-raised); color:var(--text); }
.set-confirm.saved { background:var(--green); color:#000; animation:confirmPop .3s; }
.set-confirm.failed { background:var(--red); color:#fff; }
.set-confirm.saving { opacity:.3; pointer-events:none; }
@keyframes confirmPop { 0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)} }

/* ── NOTES ── */
.notes {
  margin-top:36px; padding:22px;
  background:var(--surface-glass); border:1px solid var(--glass-border);
  border-radius:var(--radius); backdrop-filter:blur(20px);
}
.notes-h {
  font-family:'LEMON MILK',sans-serif; font-size:10px; letter-spacing:3px;
  color:var(--text-secondary); margin-bottom:14px; text-transform:uppercase;
}
.notes textarea {
  width:100%; min-height:80px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:14px;
  font-family:'Satoshi',sans-serif; font-size:13px; color:var(--text);
  resize:vertical; outline:none; line-height:1.7;
}
.notes textarea:focus { border-color:rgba(255,255,255,.15); }
.notes textarea::placeholder { color:var(--text-tertiary); }

/* ── COMPLETE ── */
.comp-btn {
  margin-top:28px; width:100%; padding:18px;
  background:var(--white); color:var(--bg); border-radius:var(--radius);
  font-family:'LEMON MILK',sans-serif; font-size:11px; letter-spacing:4px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .3s;
}
.comp-btn:hover { opacity:.85; transform:translateY(-1px); }
.comp-btn.done { background:var(--green); color:#000; }
.comp-btn.done:hover { transform:none; opacity:1; }

/* ── PLAN ── */
.ph-title {
  font-family:'LEMON MILK',sans-serif; font-size:16px; letter-spacing:4px;
  color:var(--text); margin-bottom:8px; text-transform:uppercase;
}
.ph-desc { font-size:13px; color:var(--text-secondary); margin-bottom:22px; line-height:1.5; }
.pw-row {
  display:flex; align-items:center; padding:16px 20px; margin-bottom:6px;
  background:var(--surface-glass); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); cursor:pointer; transition:all .2s;
}
.pw-row:hover { border-color:var(--glass-border-strong); }
.pw-row.cur { border-color:var(--text); background:rgba(255,255,255,.07); }
.pw-num {
  font-family:'LEMON MILK',sans-serif; font-size:11px; letter-spacing:2px;
  color:var(--text); width:80px; text-transform:uppercase;
}
.pw-focus { font-size:12px; color:var(--text-secondary); flex:1; }
.pw-status { font-size:10px; color:var(--text-tertiary); }

/* ── STATS ── */
.sg { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
.sc {
  background:var(--surface-glass); border:1px solid var(--glass-border);
  border-radius:var(--radius); padding:22px; backdrop-filter:blur(20px);
}
.sc-l { font-size:9px; letter-spacing:3px; color:var(--text-tertiary); text-transform:uppercase; margin-bottom:8px; }
.sc-v { font-family:'LEMON MILK',sans-serif; font-size:clamp(24px,4vw,32px); letter-spacing:2px; color:var(--text); }
.sc-s { font-size:11px; color:var(--text-tertiary); margin-top:4px; }
.prog-bar { width:100%; height:3px; background:var(--surface-raised); border-radius:2px; margin-top:12px; overflow:hidden; }
.prog-fill { height:100%; background:var(--white); border-radius:2px; transition:width .5s; }

/* ── PRs ── */
.pr-title {
  font-family:'LEMON MILK',sans-serif; font-size:14px; letter-spacing:3px;
  color:var(--text); margin-bottom:18px; text-transform:uppercase;
}
.pr-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 20px; margin-bottom:6px;
  background:var(--surface-glass); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
}
.pr-name { font-size:13px; font-weight:500; color:var(--text); }
.pr-val { font-family:'LEMON MILK',sans-serif; font-size:14px; letter-spacing:1px; color:var(--text); opacity:.7; }
.pr-form { display:flex; gap:12px; margin-top:24px; align-items:flex-end; flex-wrap:wrap; }
.pr-fg { display:flex; flex-direction:column; gap:5px; }
.pr-fg label { font-size:10px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; }
.pr-fg input {
  padding:12px 16px; border:1px solid var(--border); background:var(--surface);
  border-radius:var(--radius-sm); font-family:'Satoshi',sans-serif; font-size:13px;
  color:var(--text); outline:none; width:160px;
}
.pr-fg input:focus { border-color:rgba(255,255,255,.15); }
.pr-fg select {
  padding:12px 16px; border:1px solid var(--border); background:var(--surface);
  border-radius:var(--radius-sm); font-family:'Satoshi',sans-serif; font-size:13px;
  color:var(--text); outline:none; width:200px;
}
.pr-add {
  padding:12px 24px; background:var(--white); color:#000; border-radius:980px;
  font-family:'LEMON MILK',sans-serif; font-size:9px; letter-spacing:2px;
  border:none; cursor:pointer; text-transform:uppercase; transition:all .2s;
}
.pr-add:hover { opacity:.85; }

/* ══════════ NUTRITION ══════════ */
.nut-hero { text-align:center; margin-bottom:36px; }
.nut-hero-title {
  font-family:'LEMON MILK',sans-serif; font-size:clamp(20px,4vw,28px);
  letter-spacing:5px; color:var(--text); text-transform:uppercase; margin-bottom:8px;
}
.nut-hero-sub { font-size:13px; color:var(--text-secondary); }

.nut-summary {
  display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px;
  margin-bottom:36px; padding:26px 20px;
  background:var(--surface-glass); border:1px solid var(--glass-border);
  border-radius:var(--radius-lg); backdrop-filter:blur(20px);
}
.nut-macro { display:flex; flex-direction:column; align-items:center; gap:3px; }
.nut-macro-label { font-size:9px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; }
.nut-macro-val { font-family:'LEMON MILK',sans-serif; font-size:18px; letter-spacing:1px; color:var(--text); }
.nut-macro-target { font-size:10px; color:var(--text-tertiary); }
.nut-macro-bar { width:100%; height:3px; background:var(--surface-raised); border-radius:2px; margin-top:6px; overflow:hidden; }
.nut-macro-fill { height:100%; border-radius:2px; transition:width .5s; }
.nut-macro-fill.on-track { background:var(--green); }
.nut-macro-fill.under { background:var(--white); opacity:.4; }
.nut-macro-fill.over { background:var(--orange); }

.meal-block {
  margin-bottom:8px; background:var(--surface-glass);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  overflow:hidden; transition:all .25s; backdrop-filter:blur(20px);
}
.meal-block.open { border-color:var(--glass-border-strong); background:rgba(255,255,255,.07); }
.meal-header {
  display:flex; align-items:center; padding:16px 20px;
  cursor:pointer; gap:12px; transition:background .2s;
}
.meal-header:hover { background:rgba(255,255,255,.02); }
.meal-time {
  font-family:'LEMON MILK',sans-serif; font-size:9px; letter-spacing:2px;
  color:var(--text-tertiary); text-transform:uppercase; width:60px; flex-shrink:0;
}
.meal-name { font-size:13px; font-weight:500; color:var(--text); flex:1; }
.meal-macros-preview { font-size:10px; color:var(--text-tertiary); }
.meal-confirm {
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  background:var(--surface); border:none; border-radius:50%;
  color:var(--text-tertiary); cursor:pointer; transition:all .25s; font-size:12px;
}
.meal-confirm.done { background:var(--green); color:#000; }
.meal-body { padding:0 20px 18px; display:none; }
.meal-block.open .meal-body { display:block; }
.meal-items { font-size:13px; color:var(--text-secondary); line-height:1.8; margin-bottom:12px; }
.meal-why {
  font-size:11px; color:var(--text-tertiary); line-height:1.6;
  padding:12px 14px; background:var(--surface); border-radius:var(--radius-sm);
}
.meal-locked { font-size:9px; letter-spacing:2px; color:var(--text-tertiary); opacity:.4; text-transform:uppercase; margin-top:10px; }
.meal-override { margin-top:12px; }
.meal-override-btn {
  font-size:10px; color:var(--text-tertiary); opacity:.5; cursor:pointer;
  background:none; border:none; padding:4px 0; transition:opacity .2s;
}
.meal-override-btn:hover { opacity:.8; }
.meal-override-inputs { display:none; margin-top:10px; }
.meal-override-inputs.show { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.meal-ov-input {
  padding:10px; border:1px solid var(--border); background:var(--surface);
  border-radius:var(--radius-sm); font-family:'Satoshi',sans-serif; font-size:12px;
  color:var(--text); outline:none; text-align:center;
}
.meal-ov-label { font-size:8px; letter-spacing:2px; color:var(--text-tertiary); text-transform:uppercase; text-align:center; margin-bottom:4px; }

.supp-block {
  margin-top:28px; padding:22px;
  background:var(--surface-glass); border:1px solid var(--glass-border);

<script>
// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
const PW='Spyder1';
function doLogin(){
  if(document.getElementById('pw').value===PW){
    document.getElementById('login').classList.add('out');
    document.getElementById('app').classList.add('on');
    localStorage.setItem('r42auth','1');
    startApp();
  } else {
    document.getElementById('lerr').classList.add('on');
    setTimeout(()=>document.getElementById('lerr').classList.remove('on'),2000);
  }
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
if(localStorage.getItem('r42auth')==='1'){
  document.getElementById('login').classList.add('out');
  document.getElementById('app').classList.add('on');
  window.addEventListener('DOMContentLoaded',startApp);
}

// ═══════════════════════════════════════════════════════════
// PROGRAM DATA — THE RELENTLESS 42 FULL 40-WEEK PROTOCOL
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// YEAR 1 — THE ORGANISM REBUILT — 48 WEEKS
// ═══════════════════════════════════════════════════════════


const DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DAYNAMES = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY','SUNDAY'];

const PHASES = [
  // YEAR 1 (Weeks 1-48)
  {n:'STRUCTURAL REBUILD', wks:[1,12], yr:1, desc:'Fix every compensation. Right-side protocol. Mobility under load. Snatch remediation. Aerobic base. Gait retraining.'},
  {n:'STRENGTH THROUGH RANGE', wks:[13,22], yr:1, desc:'Positions earned — loads climb. Eastern Bloc wave loading. Cossack loaded. Olympic lifts progress. Deceleration training begins.'},

  // BRIDGE (Week 49)
  {n:'RESTORATION BRIDGE', wks:[49,49], yr:0, desc:'Pure recovery. Light movement, walking, swimming, massage, sleep. Full supercompensation before Year 2.'},
  // YEAR 2 (Weeks 50-97)
  {n:'HEAVY ACCUMULATION', wks:[50,61], yr:2, desc:'Wave loading at Year 2 loads. Cossack 225+. OHS genuinely heavy. Right side loads equally.'},
  {n:'BULGARIAN MASTERY', wks:[62,71], yr:2, desc:'Daily maxes 4-5 days. 8 weeks (not 12). Sleep 9 hrs. YIN YOGA ONLY evenings. No vinyasa/pilates.'},

function getPhase(w){return PHASES.find(p=>w>=p.wks[0]&&w<=p.wks[1])||PHASES[0];}

function E(name,detail,note){return{name,detail,note:note||''};}

// ═══════════════════════════════════════════════════════════
// RIGHT-SIDE PROTOCOL (A/B rotation — 5 exercises each day)
// ═══════════════════════════════════════════════════════════
const rightSideA = [

    4:{title:'ATHLETIC + SWING MECHANICS',focus:'Sprint + Jumps + Golf Loading + Rotation',duration:'65-75 min',

async function sb(endpoint, method, body){
  const opts = {
    method: method || 'GET',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if(method === 'POST') opts.headers['Prefer'] = 'resolution=merge-duplicates,return=representation';
  if(method === 'PATCH') opts.headers['Prefer'] = 'return=representation';
  if(body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(SB_URL + '/rest/v1/' + endpoint, opts);
    if(!r.ok) { console.error('SB error:', r.status, await r.text()); return null; }

function cacheSet(eid, setNum, field, val){
  if(!_sets[eid]) _sets[eid] = {};
  if(!_sets[eid][setNum]) _sets[eid][setNum] = {};
  _sets[eid][setNum][field] = val;
  // Mark as unsaved when edited
  _sets[eid][setNum].saved = false;
  save('sets', _sets);
  // Update confirm button to show unsaved state
  const btn = document.querySelector(`#sr_${eid}_${setNum} .set-confirm`);

// Confirm and write to Supabase — visual feedback
async function confirmSet(eid, setNum, btn){
  const row = _sets[eid] && _sets[eid][setNum];
  if(!row || (!row.wt && !row.reps)){ return; }

  // Show saving state
  btn.className = 'set-confirm saving';
  btn.textContent = '…';

  const wt = row.wt || '';
  const reps = row.reps || '';

  // Try PATCH first (update existing), then POST if no row exists
  let success = false;
  try {
    const patchRes = await sb(
      `set_logs?eid=eq.${encodeURIComponent(eid)}&set_num=eq.${setNum}`,
      'PATCH',
      {wt: String(wt), reps: String(reps)}
    );
    if(patchRes && patchRes.length > 0){
      success = true;
    } else {
      // No existing row — insert
      const postRes = await sb('set_logs', 'POST', {
        eid: eid,
        set_num: parseInt(setNum),
        wt: String(wt),
        reps: String(reps)
      });
      success = postRes !== null;
    }
  } catch(e){
    console.error('confirmSet error:', e);
    success = false;
  }

  if(success){
    _sets[eid][setNum].saved = true;
    save('sets', _sets);
    btn.className = 'set-confirm saved';
    btn.textContent = '✓';
  } else {
    btn.className = 'set-confirm failed';
    btn.textContent = '✗';
    // Reset after 2 seconds so they can retry
    setTimeout(()=>{ btn.className = 'set-confirm'; btn.textContent = '↑'; }, 2000);
  }
}

    compData.forEach(r=>{ if(r.completed) _completions[r.week_day] = true; });

  save('completions', _completions);

  // Load notes

  if(noteData && noteData.length){
    noteData.forEach(r=>{ if(r.note) _notes[r.week_day] = r.note; });
  }
  save('notes', _notes);

  // Load PRs
  const prData = await sb('prs?select=exercise,weight');
  if(prData && prData.length){
    prData.forEach(r=>{ _prs[r.exercise] = Number(r.weight); });
  }
  save('prs', _prs);

  // Load set logs
  const setData = await sb('set_logs?select=eid,set_num,wt,reps');
  if(setData && setData.length){
    setData.forEach(r=>{
      if(!_sets[r.eid]) _sets[r.eid] = {};
      _sets[r.eid][r.set_num] = {wt: r.wt, reps: r.reps};
    });
  }
  save('sets', _sets);

  // Load nutrition checks
  const nutData = await sb('nutrition_checks?select=check_key,checked');
  if(nutData && nutData.length){
    nutData.forEach(r=>{
      if(r.check_key.includes('_supp_')){
        if(r.checked) _suppChecks[r.check_key] = true;
      } else {
        if(r.checked) _nutChecks[r.check_key] = true;
      }
    });
  }
  save('nutChecks', _nutChecks);
  save('suppChecks', _suppChecks);
}

  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');

  document.getElementById('clock').textContent = h+':'+m+':'+s;

  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const dn = dayNames[now.getDay()];
  const dd = String(now.getDate()).padStart(2,'0');
  const mn = monthNames[now.getMonth()];
  const yr = now.getFullYear();
  document.getElementById('dateDisp').textContent = dn+' '+dd+' - '+mn+' - '+yr;
}

// CALCULATE CURRENT WEEK
// ═══════════════════════════════════════════════════════════
function calcCurrentWeek(){
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Toronto'}));
  const diff = now - PROG_START;
  if(diff < 0) return {week:1, day:0};
  const totalDays = Math.floor(diff / (1000*60*60*24));
  const week = Math.floor(totalDays / 7) + 1;
  const day = totalDays % 7; // 0=Mon
  return {week: Math.min(Math.max(week,1),145), day: Math.min(day,6)};
}

  h += `<div class="dh-m"><div class="dh-m-l">Duration</div><div class="dh-m-v">${data.duration}</div></div>`;
  h += `</div>`;

  // Warmup
  if(data.warmup && data.warmup.length){
    h += `<div class="sec"><div class="sec-h">WARM-UP</div>`;
    data.warmup.forEach((ex,i)=>{ h += exHTML(ex,'wu',i); });
    h += `</div>`;
  }

  // Core Activation
  if(data.core && data.core.length){
    h += `<div class="sec"><div class="sec-h">CORE ACTIVATION</div>`;
    data.core.forEach((ex,i)=>{ h += exHTML(ex,'co',i); });
    h += `</div>`;
  }

  // Main Work
  if(data.main && data.main.length){
    h += `<div class="sec"><div class="sec-h">MAIN WORK</div>`;
    data.main.forEach((ex,i)=>{ h += exHTML(ex,'mw',i); });
    h += `</div>`;
  }

  // Conditioning
  if(data.conditioning && data.conditioning.length){
    h += `<div class="sec"><div class="sec-h">CONDITIONING / FINISHER</div>`;
    data.conditioning.forEach((ex,i)=>{ h += exHTML(ex,'cn',i); });
    h += `</div>`;
  }

  // Session Notes
  const note = getNotes(curWeek, curDay);
  h += `<div class="notes"><div class="notes-h">SESSION NOTES</div>`;
  h += `<textarea placeholder="Log weights, RPE, how it felt..." onchange="setNote(${curWeek},${curDay},this.value)">${note}</textarea></div>`;

  // Complete Button
  const done = isComplete(curWeek, curDay);
  h += `<button class="comp-btn${done?' done':''}" onclick="markComplete()" id="compBtn">${done?'SESSION COMPLETE ✓':'MARK SESSION COMPLETE'}</button>`;

  p.innerHTML = h;
}

function exHTML(ex, section, idx){
  const eid = `${curWeek}_${curDay}_${section}_${idx}`;
  const parsed = parseExercise(ex.detail, ex.name);
  const numSets = parsed.sets;
  const logged = getSetLog(eid);

  // Detect if this is a time-based exercise (rowing, running, conditioning)
  const isTimeBased = isTimeExercise(ex.name, ex.detail);
  const isCarry = /farmer|carry|carries/i.test(ex.name);

  let h = `<div class="ex" onclick="toggleEx(this, event)" data-eid="${eid}">`;
  h += `<div class="ex-dot"></div><div class="ex-body">`;

  h += `<div class="ex-detail">${ex.detail}</div>`;

    h += `<div class="ex-toggle">TAP TO LOG SETS</div>`;

      h += `<span>SET</span><span>TARGET</span><span>WEIGHT</span><span>DIST</span><span class="sh-c">SAVE</span>`;

      for(let s=1; s<=numSets; s++){

        h += `<input class="set-input" type="text" inputmode="text" placeholder="${carryTarget.dist||'meters'}" value="${sv.reps||''}" oninput="cacheSet('${eid}',${s},'reps',this.value)" onfocus="this.select()">`;
        h += `<button class="set-confirm${isSaved?' saved':''}" onclick="confirmSet('${eid}',${s},this)" title="Save to database">${isSaved?'✓':'↑'}</button>`;
        h += `</div>`;
      }

      // TIME-BASED: SET | TARGET | TIME | DIST | PACE | SAVE
      const timeTarget = parseTimeTarget(ex.detail, ex.name, curWeek);
      h += `<div class="sets-hdr" style="grid-template-columns:36px 1fr 1fr 1fr 1fr 40px;">`;
      h += `<span>SET</span><span>TARGET</span><span>TIME</span><span>DIST</span><span>PACE</span><span class="sh-c">SAVE</span>`;
      h += `</div>`;

      for(let s=1; s<=numSets; s++){
        const sv = logged[s] || {};
        const isSaved = sv.saved;

        h += `<div class="set-row" id="sr_${eid}_${s}" style="grid-template-columns:36px 1fr 1fr 1fr 1fr 40px;">`;
        h += `<div class="set-label">S${s}</div>`;
        h += `<div class="set-target-wt" style="font-size:9px;">${timeTarget||'—'}</div>`;
        h += `<input class="set-input" type="text" inputmode="text" placeholder="0:00" value="${sv.wt||''}" oninput="cacheSet('${eid}',${s},'wt',this.value)" onfocus="this.select()" style="font-variant-numeric:tabular-nums;">`;
        h += `<input class="set-input" type="text" inputmode="text" placeholder="meters" value="${sv.reps||''}" oninput="cacheSet('${eid}',${s},'reps',this.value)" onfocus="this.select()">`;
        h += `<div class="pct-badge neutral" style="font-size:9px;">${calcPace(sv.wt, sv.reps)}</div>`;
        h += `<button class="set-confirm${isSaved?' saved':''}" onclick="confirmSet('${eid}',${s},this)" title="Save to database">${isSaved?'✓':'↑'}</button>`;
        h += `</div>`;
      }
    } else {
      // STANDARD HEADERS: SET | TARGET | WEIGHT | REPS | % | SAVE
      h += `<div class="sets-hdr">`;
      h += `<span>SET</span><span>TARGET</span><span>WEIGHT</span><span>REPS</span><span class="sh-c">%</span><span class="sh-c">SAVE</span>`;
      h += `</div>`;

      const repScheme = parsed.repScheme;

      for(let s=1; s<=numSets; s++){
        const sv = logged[s] || {};
        const setTarget = targetWt ? Math.round(targetWt) : 0;
        const setReps = repScheme[s-1] || parsed.reps || '';
        const actualWt = sv.wt ? parseFloat(sv.wt) : 0;
        const isSaved = sv.saved;

        let pctClass = 'neutral';
        let pctText = '—';
        if(setTarget > 0 && actualWt > 0){
          const pctVal = Math.round((actualWt / setTarget) * 100);
          pctText = pctVal + '%';
          pctClass = pctVal >= 100 ? 'hit' : pctVal >= 90 ? 'neutral' : 'miss';
        }

        h += `<div class="set-row" id="sr_${eid}_${s}">`;
        h += `<div class="set-label">S${s}</div>`;
        h += `<div class="set-target-wt">${setTarget > 0 ? setTarget+'<span style="font-size:8px;opacity:.5;margin-left:2px">lbs</span>' : '—'}</div>`;
        h += `<input class="set-input" type="number" inputmode="decimal" placeholder="${setTarget>0?setTarget:'lbs'}" value="${sv.wt||''}" data-eid="${eid}" data-set="${s}" data-target="${setTarget}" oninput="cacheSet('${eid}',${s},'wt',this.value);updatePctBadge(this)" onfocus="this.select()">`;
        h += `<input class="set-input" type="number" inputmode="numeric" placeholder="${setReps||'reps'}" value="${sv.reps||''}" oninput="cacheSet('${eid}',${s},'reps',this.value)" onfocus="this.select()">`;
        h += `<div class="pct-badge ${pctClass}" data-eid="${eid}" data-set="${s}">${pctText}</div>`;
        h += `<button class="set-confirm${isSaved?' saved':''}" onclick="confirmSet('${eid}',${s},this)" title="Save to database">${isSaved?'✓':'↑'}</button>`;
        h += `</div>`;
      }
    }
    h += `</div>`;
  }

  h += `</div></div>`;
  return h;
}

// Detect time-based exercises
function isTimeExercise(name, detail){
  const n = name.toLowerCase();
  const d = (detail||'').toLowerCase();
  // EXCLUDE these — they use weight/reps or weight/distance
  if(/pendlay/i.test(n)) return false;
  if(/farmer/i.test(n)) return false;
  // Match rowing (not Pendlay Row), running, 400m, 2000m, conditioning, sled, sprints
  if(/^row$|^row |rower|rowing|row interval/i.test(n)) return true;
  if(/\b400m\b|\b2000m\b|\b100m\b/i.test(n)) return true;
  if(/\bcondition/i.test(n) && /400m|row|run/i.test(d)) return true;
  if(/\bsled\b/i.test(n)) return true;
  if(/\bsprint/i.test(n)) return true;
  if(/\blinear sprint/i.test(n)) return true;
  // Check detail for time patterns (but not "40m" which could be carries)
  if(/\d+\s*[x×]\s*\d+\s*min/i.test(d)) return true;
  return false;
}

// Calculate pace from time and distance (e.g. "5:03" and "1130" → "/500m")
function calcPace(timeStr, distStr){
  if(!timeStr || !distStr) return '—';
  let totalSec = 0;
  const colonMatch = String(timeStr).match(/(\d+):(\d+)/);
  if(colonMatch){
    totalSec = parseInt(colonMatch[1])*60 + parseInt(colonMatch[2]);
  } else {
    const num = parseFloat(timeStr);
    if(num > 10) totalSec = num;
    else totalSec = num * 60;
  }
  const dist = parseFloat(distStr);
  if(!totalSec || !dist || dist === 0) return '—';
  const pacePerM = totalSec / dist;
  const pacePer500 = pacePerM * 500;
  const paceMin = Math.floor(pacePer500 / 60);
  const paceSec = Math.round(pacePer500 % 60);
  return paceMin+':'+String(paceSec).padStart(2,'0')+'/500m';
}

// Parse target for time-based exercises from their detail string
function parseTimeTarget(detail, name, week){
  const d = (detail||'').toLowerCase();
  const n = (name||'').toLowerCase();
  
  // Row with pace target: "5×5min@Z2", "4×8min@Z2-Z3", "40min@Z2"
  if(/\d+\s*[x×]\s*\d+\s*min\s*@/.test(d)){
    const m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*min\s*@\s*(.+?)(?:\s|$)/);
    if(m) return m[2]+'min @ '+m[3].toUpperCase();
  }
  if(/^\d+\s*min\s*@/.test(d)){
    const m = d.match(/(\d+)\s*min\s*@\s*(.+?)(?:\s|$)/);
    if(m) return m[1]+'min @ '+m[2].toUpperCase();
  }
  
  // Row intervals with pace: "8×3min@1:50/500m", "4×5min@1:45/500m"
  if(/\d+:\d+\/500/.test(d)){
    const m = d.match(/(\d+:\d+)\/500/);
    if(m) return m[1]+'/500m';
  }
  
  // 400m with time target: "6×400m@70s", "8×400m@sub-68s"
  if(/400m/.test(d)){
    const m = d.match(/@\s*(sub[- ]?\d+s?|\d+s)/i);
    if(m) return m[1];
    // Derive from week
    if(week<=12) return '< 90s';
    if(week<=22) return '< 78s';
    if(week<=32) return '< 72s';
    if(week<=42) return '< 68s';
    if(week<=61) return '< 68s';
    if(week<=71) return '< 65s';
    if(week<=83) return '< 62s';
    return '< 60s';
  }
  
  // Sprint with distance: "6×10m + 4×20m"
  if(/sprint/i.test(n) || /linear sprint/i.test(n)){
    if(week<=12) return 'Mechanics';
    if(week<=22) return 'Speed dev';
    if(week<=32) return 'Max velocity';
    if(week<=48) return 'Peak speed';
    if(week<=61) return 'Sub-11.3';
    if(week<=71) return 'Sub-11.0';
    if(week<=83) return 'Sub-10.9';
    return 'Sub-10.8';
  }
  
  // 100m test
  if(/100m/i.test(n)){
    if(week<=48) return '< 11.3s';
    if(week<=71) return '< 11.0s';
    return '< 10.8s';
  }
  
  // 2000m row test
  if(/2000m/i.test(n)){
    if(week<=48) return '< 1:45/500m';
    if(week<=71) return '< 1:40/500m';
    return '< 1:38/500m';
  }
  
  // 10K run
  if(/10k/i.test(n) || /10k/i.test(d)){
    if(week<=48) return '< 43min';
    if(week<=71) return '< 35min';
    return '< 34min';
  }
  
  // 5K/6K/7K/8K runs
  const kmMatch = d.match(/(\d)k\s*run/i);
  if(kmMatch){
    const km = parseInt(kmMatch[1]);
    return '~'+(km*4.5)+'min';
  }
  
  // Sled with distance: "8×20m heavy"
  if(/sled/i.test(n)){
    const m = d.match(/(\d+)\s*[x×]\s*(\d+)m/);
    if(m) return m[2]+'m @ heavy';
    return 'Max effort';
  }
  
  // Generic row
  if(/^row$/i.test(n.trim())){
    if(week<=12) return 'Z2 HR';
    if(week<=32) return '< 1:50/500m';
    if(week<=48) return '< 1:45/500m';
    if(week<=71) return '< 1:42/500m';
    return '< 1:38/500m';
  }
  
  // Row intervals
  if(/row interval/i.test(n)){
    if(week<=42) return '< 1:50/500m';
    if(week<=61) return '< 1:45/500m';
    if(week<=71) return '< 1:42/500m';
    return '< 1:38/500m';
  }
  
  // Conditioning catch-all
  if(/condition/i.test(n)){
    if(/row/i.test(d)) return 'Z2 HR';
    if(/400m/i.test(d)) return '< 75s';
    return '—';
  }
  
  return '—';
}

// Parse target for carry exercises from their detail string
function parseCarryTarget(detail){
  const d = (detail||'');
  // "4 × 40m heavy", "3×30m moderate"
  const m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*m\s*(heavy|moderate|light)?/i);
  if(m){
    const load = m[3] ? m[3] : '';
    return {wt: load||'heavy', dist: m[2]+'m'};
  }
  return {wt:'', dist:''};
}

function toggleEx(el, e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON'||e.target.classList.contains('pct-badge')||e.target.classList.contains('set-confirm')) return;
  el.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════════
// EXERCISE PARSER — extracts sets, reps, percentage from detail string
// ═══════════════════════════════════════════════════════════
function parseExercise(detail, name){
  if(!detail) return {sets:0, reps:0, pct:0, repScheme:[]};
  const d = detail;

  // ── Wave loading: "10-8-6-5 @ 65-75-80-83%"
  let m = d.match(/^(\d+[-–]\d+(?:[-–]\d+)*)\s*@\s*(\d+)[-–](\d+)[-–]?(\d+)?[-–]?(\d+)?%/);
  if(m){
    const reps = m[1].split(/[-–]/).map(Number);
    const pcts = [m[2],m[3],m[4],m[5]].filter(Boolean).map(Number);
    // Use the highest percentage as the working target
    return {sets:reps.length, reps:0, pct:pcts[pcts.length-1]||pcts[0], repScheme:reps, pctScheme:pcts};
  }

  // ── "NxN @ NN%" pattern
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*@\s*[+]?(\d+)%/i);
  if(m){
    const sets=parseInt(m[1]), reps=parseInt(m[2]), pct=parseInt(m[3]);
    return {sets, reps, pct, repScheme:Array(sets).fill(reps)};
  }

  // ── "NxN @ +NNlbs" (weighted pull-ups etc)
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*@\s*[+]?(\d+)\s*lbs/i);
  if(m){
    return {sets:parseInt(m[1]), reps:parseInt(m[2]), pct:0, repScheme:Array(parseInt(m[1])).fill(parseInt(m[2])), fixedWt:parseInt(m[3])};
  }

  // ── "NxN BW" or "NxN bodyweight"
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*(BW|bodyweight)/i);
  if(m){
    return {sets:parseInt(m[1]), reps:parseInt(m[2]), pct:0, repScheme:Array(parseInt(m[1])).fill(parseInt(m[2]))};
  }

  // ── "NxN @ moderate" or "NxN @ heavy" etc (no specific %)
  m = d.match(/(\d+)\s*[x×]\s*(\d+)/i);
  if(m){
    // Try to find a percentage after
    const pctM = d.match(/(\d+)%/);
    const pct = pctM ? parseInt(pctM[1]) : 0;
    const sets=parseInt(m[1]), reps=parseInt(m[2]);
    return {sets, reps, pct, repScheme:Array(sets).fill(reps)};
  }

  // ── "DELOAD: 3x5 @ 65%"
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*@\s*(\d+)%/i);
  if(m){
    const sets=parseInt(m[1]), reps=parseInt(m[2]), pct=parseInt(m[3]);
    return {sets, reps, pct, repScheme:Array(sets).fill(reps)};
  }

  // ── "~5-7 sets to technical max" or "Work to Daily Max"
  if(/work to/i.test(d)){
    return {sets:6, reps:1, pct:0, repScheme:[1,1,1,1,1,1]};
  }
  m = d.match(/~?(\d+)[-–](\d+)\s*sets/i);
  if(m){
    const sets = Math.ceil((parseInt(m[1])+parseInt(m[2]))/2);
    return {sets, reps:1, pct:0, repScheme:Array(sets).fill(1)};
  }

  // ── "N attempts"
  m = d.match(/(\d+)\s*attempt/i);
  if(m){
    return {sets:parseInt(m[1]), reps:1, pct:0, repScheme:Array(parseInt(m[1])).fill(1)};
  }

  // ── Time-based (no sets to log)
  if(/^\d+\s*min/i.test(d)) return {sets:0, reps:0, pct:0, repScheme:[]};
  if(/sec/i.test(d) && !/[x×]/i.test(d)) return {sets:0, reps:0, pct:0, repScheme:[]};

  // ── Conditioning patterns: "5×5min", "6×10m", "8×20m", "4×400m", "2×(4×400m)"
  m = d.match(/(\d+)\s*[x×]\s*(\d+)\s*(min|m\b|sec)/i);
  if(m){
    return {sets:parseInt(m[1]), reps:0, pct:0, repScheme:Array(parseInt(m[1])).fill(0), isConditioning:true};
  }

  // Fallback
  m = d.match(/^(\d+)\s*[x×]/i);
  if(m) return {sets:parseInt(m[1]), reps:0, pct:0, repScheme:Array(parseInt(m[1])).fill(0)};

  return {sets:0, reps:0, pct:0, repScheme:[]};
}

// ═══════════════════════════════════════════════════════════
// TARGET WEIGHT CALCULATOR — from PRs × prescribed %
// ═══════════════════════════════════════════════════════════
const EXERCISE_PR_MAP = {
  'Power Clean':'Power Clean', 'Front Squat':'Front Squat',
  'Box Back Squat':'Box Back Squat', 'Back Squat':'Box Back Squat',
  'Back Squat — Work to Daily Max':'Box Back Squat',
  'Front Squat — Work to Daily Max':'Front Squat',
  'Power Clean — Work to Daily Max':'Power Clean',
  'Snatch — Work to Daily Max':'Snatch',
  'Back Squat Back-off':'Box Back Squat',
  'Box Back Squat Back-off':'Box Back Squat',
  'Box Back Squat — Work to Daily Max':'Box Back Squat',
  'Front Squat Back-off':'Front Squat',
  'Power Clean Back-off':'Power Clean',
  'Snatch Back-off':'Snatch',
  'BB Hip Thrust':'BB Hip Thrust',
  'Flat Bench Press':'Bench Press', 'Bench Press':'Bench Press',
  'Bench Press — 1RM Test':'Bench Press',
  'Box Back Squat — 1RM Test':'Box Back Squat',
  'Front Squat — 1RM Test':'Front Squat',
  'Power Clean — 1RM Test':'Power Clean',
  'Snatch — 1RM Test':'Snatch',
  'Pendlay Row — 1RM Test':'Pendlay Row',
  'Pendlay Row':'Pendlay Row',
  'Hang Snatch':'Snatch', 'Snatch':'Snatch',
  'Weighted Pull-ups':'Weighted Pull-ups',
  'Chin-ups (Weighted)':'Weighted Pull-ups',
  'Weighted Pull-ups — Max Test':'Weighted Pull-ups',
  'Bulgarian Split Squat':'Bulgarian Split Squat',
  'BSS':'Bulgarian Split Squat',
  'Deficit Reverse Lunge':'Bulgarian Split Squat',
  'SLRDL':'Bulgarian Split Squat',
  'DB Shoulder Press':'DB Shoulder Press',
  'DB Shoulder Press — Max Test':'DB Shoulder Press',
  'Barbell Cossack Squat':'Barbell Cossack Squat',
  'Barbell Cossack Squat — Max Test':'Barbell Cossack Squat',
  'Overhead Squat':'Overhead Squat',
  'Overhead Squat — 1RM Test':'Overhead Squat',
  'Trap Bar Jumps':'Trap Bar Jumps',
  'Snatch Pull':'Snatch',
  'BB Hip Thrust — 1RM Test':'BB Hip Thrust',
  'Landmine Press':'Bench Press',
  'Nordic Curls':'Nordic Curls',
  'Handstand Push-up Progression':'Handstand Push-up Progression',
};

function calcTarget(exName, pct, detail){
  // 1. If we have a percentage AND a mapped PR, calculate from 1RM
  if(pct && pct > 0){
    const prKey = EXERCISE_PR_MAP[exName];
    if(prKey){
      const prs = getPRs();
      const pr1rm = prs[prKey];
      if(pr1rm && pr1rm > 0){
        return Math.round((pct / 100) * pr1rm / 5) * 5;
      }
    }
  }
  // 2. If detail has a fixed weight like "+70 lbs", "@155-175", "@ 80-85 lbs", "@ moderate-heavy"
  if(detail){
    // Match "+NN lbs" or "+NN" for weighted pull-ups/chin-ups
    let m = detail.match(/@\s*\+?(\d+)(?:\s*lbs)?/);
    if(m) return parseInt(m[1]);
    // Match "@ NN-NN lbs" or "@ NN lbs" — take the higher number
    m = detail.match(/@\s*(\d+)[-–]?(\d+)?\s*(?:lbs)?/);
    if(m){
      const v = m[2] ? parseInt(m[2]) : parseInt(m[1]);
      // Only return if it looks like a weight (not a percentage)
      if(v > 0 && !/%/.test(detail.slice(detail.indexOf(m[0])))) return v;
    }
    // Match fixed weights in the string like "4×5@205-225" — take higher
    m = detail.match(/(\d+)\s*[x×]\s*\d+\s*@\s*(\d+)[-–]?(\d+)?/);
    if(m && !/%/.test(detail)){
      return m[3] ? parseInt(m[3]) : parseInt(m[2]);
    }
  }
  return 0;
}

// LIVE % BADGE UPDATE
// ═══════════════════════════════════════════════════════════
function updatePctBadge(input){
  const eid = input.dataset.eid;
  const setNum = input.dataset.set;
  const target = parseFloat(input.dataset.target);
  const actual = parseFloat(input.value);
  const badge = document.querySelector(`.pct-badge[data-eid="${eid}"][data-set="${setNum}"]`);
  if(!badge) return;

  if(target > 0 && actual > 0){
    const pctVal = Math.round((actual / target) * 100);
    badge.textContent = pctVal + '%';
    badge.className = 'pct-badge ' + (pctVal >= 100 ? 'hit' : pctVal >= 90 ? 'neutral' : 'miss');
  } else {
    badge.textContent = '—';
    badge.className = 'pct-badge neutral';
  }
}

// Phase-based calorie targets
function getNutTargets(){
  const pn = getPhaseNum(curWeek);
  if(pn<=2) return {cal:3500, p:220, c:420, f:90};
  if(pn===3) return {cal:3700, p:230, c:450, f:95};
  if(pn===4) return {cal:3600, p:225, c:435, f:90};
  return {cal:3300, p:215, c:390, f:85};
}

// Nutrition state
let _nutChecks = {}; // {date_mealId: true}
let _nutOverrides = {}; // {date_mealId: {p,c,f}}
let _suppChecks = {}; // {date_suppIdx: true}

function getNutKey(){ 
  const now = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Toronto'}));
  return now.toISOString().slice(0,10);
}

function toggleMealCheck(mealId, btn){
  const key = getNutKey()+'_'+mealId;
  _nutChecks[key] = !_nutChecks[key];
  save('nutChecks', _nutChecks);
  btn.classList.toggle('done', _nutChecks[key]);
  updateNutSummary();
  // Save to Supabase
  sb(`nutrition_checks?check_key=eq.${encodeURIComponent(key)}`, 'PATCH', {checked: _nutChecks[key]})
    .then(res => {
      if(!res || res.length === 0) sb('nutrition_checks', 'POST', {check_key: key, checked: _nutChecks[key]});
    });
}

function toggleSuppCheck(idx, btn){
  const key = getNutKey()+'_supp_'+idx;
  _suppChecks[key] = !_suppChecks[key];
  save('suppChecks', _suppChecks);
  btn.classList.toggle('done', _suppChecks[key]);
  sb(`nutrition_checks?check_key=eq.${encodeURIComponent(key)}`, 'PATCH', {checked: _suppChecks[key]})
    .then(res => {
      if(!res || res.length === 0) sb('nutrition_checks', 'POST', {check_key: key, checked: _suppChecks[key]});
    });
}

function toggleMealBlock(el){
  el.closest('.meal-block').classList.toggle('open');
}

function showOverride(mealId){
  const el = document.getElementById('ov_'+mealId);
  if(el) el.classList.toggle('show');
}

function saveOverride(mealId){
  const p = parseFloat(document.getElementById('ov_p_'+mealId).value)||0;
  const c = parseFloat(document.getElementById('ov_c_'+mealId).value)||0;
  const f = parseFloat(document.getElementById('ov_f_'+mealId).value)||0;
  const key = getNutKey()+'_'+mealId;
  _nutOverrides[key] = {p,c,f};
  save('nutOverrides', _nutOverrides);
  updateNutSummary();
}

function getMealMacros(meal){
  const key = getNutKey()+'_'+meal.id;
  if(_nutOverrides[key]) return _nutOverrides[key];
  return meal.macros;
}

function updateNutSummary(){
  const targets = getNutTargets();
  let totP=0, totC=0, totF=0;
  const today = getNutKey();
  MEALS.forEach(m=>{
    const key = today+'_'+m.id;
    if(_nutChecks[key]){
      const mac = getMealMacros(m);
      totP += mac.p; totC += mac.c; totF += mac.f;
    }
  });
  const totCal = totP*4 + totC*4 + totF*9;

  const setBar = (id, val, target) => {
    const el = document.getElementById(id);
    if(!el) return;
    const pct = Math.min(Math.round(val/target*100),150);
    el.querySelector('.nut-macro-val').textContent = val;
    el.querySelector('.nut-macro-target').textContent = '/ '+target;
    const fill = el.querySelector('.nut-macro-fill');
    fill.style.width = Math.min(pct,100)+'%';
    fill.className = 'nut-macro-fill '+(pct>=90&&pct<=110?'on-track':pct>110?'over':'under');
  };
  setBar('nm-cal', totCal, targets.cal);
  setBar('nm-p', totP, targets.p);
  setBar('nm-c', totC, targets.c);
  setBar('nm-f', totF, targets.f);
}

    h += `</div>`;

  h += `</div>`;

  // Hydration reminder
  h += `<div class="hydration-card">`;

  h += `</div>`;

  p.innerHTML = h;

  // Update summary after render
  setTimeout(updateNutSummary, 50);
}

function nav(view){
  curView = view;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('on', b.dataset.v===view));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));

}

function chgWeek(dir){
  curWeek = Math.min(Math.max(curWeek+dir,1),145);
  curDay = 0;
  renderAll();
}
